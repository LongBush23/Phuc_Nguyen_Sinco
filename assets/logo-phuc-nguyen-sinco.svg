<svg width="660" height="220" viewBox="0 0 660 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .logo-text-main { font-family: 'Georgia', serif; font-size: 28px; font-weight: 700; fill: #1a1209; letter-spacing: 2px; }
    .logo-text-sub  { font-family: 'Georgia', serif; font-size: 11px; font-weight: 400; fill: #7a6030; letter-spacing: 5px; }
    .logo-text-tag  { font-family: 'Georgia', serif; font-size: 9px;  font-weight: 400; fill: #b8902a; letter-spacing: 3px; }
  </style>
  <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#e8c35a"/>
    <stop offset="50%"  stop-color="#c8902a"/>
    <stop offset="100%" stop-color="#a06820"/>
  </linearGradient>
  <linearGradient id="goldGrad2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#f0d070"/>
    <stop offset="100%" stop-color="#b07820"/>
  </linearGradient>
</defs>



<!-- ===== GEAR CLUSTER ===== -->
<!-- Large gear: cx=110, cy=110 -->
<g transform="translate(110,110)">
  <circle r="58" fill="url(#goldGrad)" stroke="#a07020" stroke-width="1"/>
  <circle r="45" fill="white" stroke="#c09030" stroke-width="0.8"/>
  <circle r="14" fill="url(#goldGrad)" stroke="#a07020" stroke-width="1"/>
  <circle r="6"  fill="white"/>
  <g fill="url(#goldGrad)" stroke="#a07020" stroke-width="0.5">
    <rect x="-6" y="-67" width="12" height="14" rx="2"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(22.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(45)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(67.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(90)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(112.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(135)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(157.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(180)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(202.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(225)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(247.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(270)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(292.5)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(315)"/>
    <rect x="-6" y="-67" width="12" height="14" rx="2" transform="rotate(337.5)"/>
  </g>
  <line x1="0" y1="-42" x2="0"  y2="42"  stroke="#c09030" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="-42" y1="0" x2="42" y2="0"   stroke="#c09030" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="-30" y1="-30" x2="30" y2="30" stroke="#c09030" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="30" y1="-30" x2="-30" y2="30" stroke="#c09030" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</g>

<!-- Small gear top-right: cx=181, cy=53 -->
<g transform="translate(181,53)">
  <circle r="25" fill="url(#goldGrad2)" stroke="#a07020" stroke-width="0.8"/>
  <circle r="18" fill="white" stroke="#c09030" stroke-width="0.6"/>
  <circle r="6"  fill="url(#goldGrad2)" stroke="#a07020" stroke-width="0.5"/>
  <circle r="2.5" fill="white"/>
  <g fill="url(#goldGrad2)" stroke="#a07020" stroke-width="0.4">
    <rect x="-4" y="-31" width="8" height="9" rx="1.5"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(30)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(60)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(90)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(120)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(150)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(180)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(210)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(240)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(270)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(300)"/>
    <rect x="-4" y="-31" width="8" height="9" rx="1.5" transform="rotate(330)"/>
  </g>
</g>

<!-- Tiny gear bottom-right: cx=186, cy=163 -->
<g transform="translate(186,163)">
  <circle r="16" fill="url(#goldGrad)" stroke="#a07020" stroke-width="0.6"/>
  <circle r="11" fill="white" stroke="#c09030" stroke-width="0.5"/>
  <circle r="4"  fill="url(#goldGrad)" stroke="#a07020" stroke-width="0.4"/>
  <circle r="1.5" fill="white"/>
  <g fill="url(#goldGrad)" stroke="#a07020" stroke-width="0.3">
    <rect x="-3" y="-20" width="6" height="7" rx="1"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(40)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(80)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(120)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(160)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(200)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(240)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(280)"/>
    <rect x="-3" y="-20" width="6" height="7" rx="1" transform="rotate(320)"/>
  </g>
</g>

<!-- ===== DIVIDER ===== -->
<line x1="228" y1="35" x2="228" y2="185" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5"/>
<circle cx="228" cy="110" r="2.5" fill="#c8902a"/>

<!-- ===== TEXT ===== -->
<text class="logo-text-sub"  x="248" y="60"  dominant-baseline="central">THIẾT BỊ CÔNG NGHIỆP</text>
<text class="logo-text-main" x="248" y="95"  dominant-baseline="central">PHÚC NGUYỄN</text>
<text class="logo-text-main" x="248" y="130" dominant-baseline="central">SINCO</text>
<line x1="248" y1="150" x2="610" y2="150" stroke="#c09030" stroke-width="0.6" opacity="0.4"/>
<text class="logo-text-tag"  x="248" y="165" dominant-baseline="central">BĂNG TẢI · CON LĂN · TỰ ĐỘNG HÓA</text>
</svg>
